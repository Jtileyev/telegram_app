name: Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd bot
          python -m pytest tests.py -v --tb=short
        env:
          DATABASE_PATH: ":memory:"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test  # Деплой только после успешных тестов
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: ${{ secrets.VDS_PORT || 22 }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            
            # Переменные
            APP_DIR="${{ secrets.APP_DIR || '/var/www/astavaisya' }}"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            
            echo "📦 Deploying to $APP_DIR..."
            
            # Создаём директорию если нет
            mkdir -p $APP_DIR
            cd $APP_DIR
            
            # Fix git ownership issue
            git config --global --add safe.directory $APP_DIR
            
            # Первый деплой или обновление
            if [ -d ".git" ]; then
              echo "🔄 Pulling latest changes..."
              # Update remote URL with token
              git remote set-url origin $REPO_URL
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📥 Cloning repository..."
              git clone $REPO_URL .
            fi
            
            # Python окружение
            echo "🐍 Setting up Python environment..."
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -q -r requirements.txt
            
            # Проверяем .env
            if [ ! -f ".env" ]; then
              echo "⚠️ .env not found! Copy from .env.example and configure manually"
              cp .env.example .env
            fi
            
            # Миграции БД (если нужно)
            if [ -f "database/apply_promotions_migration.py" ]; then
              echo "🗄️ Running migrations..."
              python database/apply_promotions_migration.py || true
            fi
            
            # Обновляем nginx конфиг ТОЛЬКО если его ещё нет (чтобы не затереть SSL настройки от certbot)
            echo "🌐 Checking nginx config..."
            if [ ! -f /etc/nginx/sites-available/astavaisya ]; then
              echo "📝 Creating initial nginx config..."
              sudo cp nginx/astavaisya.conf /etc/nginx/sites-available/astavaisya
              sudo ln -sf /etc/nginx/sites-available/astavaisya /etc/nginx/sites-enabled/
              sudo nginx -t && sudo systemctl reload nginx
            else
              echo "✓ Nginx config already exists, preserving SSL settings"
            fi
            
            # Установка certbot если нет
            if ! command -v certbot &> /dev/null; then
              echo "📦 Installing certbot..."
              sudo apt update
              sudo apt install -y certbot python3-certbot-nginx
            fi
            
            # SSL сертификат (только если домен резолвится и сертификата ещё нет или он скоро истечёт)
            DOMAIN="actavaysa.kz"
            if host $DOMAIN > /dev/null 2>&1; then
              CERT_FILE="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
              NEED_CERT=false
              
              if [ ! -f "$CERT_FILE" ]; then
                echo "🔒 SSL certificate not found, will obtain new one..."
                NEED_CERT=true
              else
                # Проверяем срок действия сертификата (обновляем если осталось менее 30 дней)
                EXPIRY_DATE=$(sudo openssl x509 -enddate -noout -in "$CERT_FILE" 2>/dev/null | cut -d= -f2)
                if [ -n "$EXPIRY_DATE" ]; then
                  EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s 2>/dev/null || echo 0)
                  NOW_EPOCH=$(date +%s)
                  DAYS_LEFT=$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ))
                  
                  if [ "$DAYS_LEFT" -lt 30 ]; then
                    echo "🔒 SSL certificate expires in $DAYS_LEFT days, will renew..."
                    NEED_CERT=true
                  else
                    echo "🔒 SSL certificate is valid for $DAYS_LEFT more days, skipping renewal"
                  fi
                else
                  echo "⚠️ Could not read certificate expiry, will attempt renewal..."
                  NEED_CERT=true
                fi
              fi
              
              if [ "$NEED_CERT" = true ]; then
                echo "🔒 Obtaining/renewing SSL certificate..."
                sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN --non-interactive --agree-tos --email ${{ secrets.ADMIN_EMAIL }} || echo "⚠️ SSL setup failed (maybe DNS not ready)"
              fi
            else
              echo "⏳ Domain not resolving yet, skipping SSL"
            fi
            
            # Перезапуск бота через systemd
            echo "🤖 Restarting bot service..."
            sudo systemctl restart astavaisya-bot || echo "⚠️ Bot service not configured"
            
            # Перезапуск PHP-FPM (если используется)
            sudo systemctl reload php8.1-fpm || sudo systemctl reload php-fpm || true
            
            echo "✅ Deployment complete!"

      - name: Notify on success
        if: success()
        run: echo "✅ Deployment successful!"
      
      - name: Notify on failure
        if: failure()
        run: echo "❌ Deployment failed!"
